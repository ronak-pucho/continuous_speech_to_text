name: continuous_speech_to_text
description: "A robust Flutter plugin for continuous, uninterrupted speech-to-text recognition on Android. Bypasses standard timeouts and annoying beep sounds."
version: 0.0.1
homepage: "https://github.com/ronak-pucho/continuous_speech_to_text"
repository: "https://github.com/ronak-pucho/continuous_speech_to_text"
issue_tracker: "https://github.com/ronak-pucho/continuous_speech_to_text/issues"

environment:
  sdk: ^3.11.5
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.example.continuous_speech_to_text
        pluginClass: ContinuousSpeechToTextPlugin
